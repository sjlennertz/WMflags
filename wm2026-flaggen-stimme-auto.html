<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>WM 2026 Flaggen-Quiz</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Arial',sans-serif;background:#0a1628;min-height:100vh;color:#fff}

/* ── Player overlay ── */
.overlay{position:fixed;inset:0;background:rgba(5,12,28,0.97);z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;padding:30px}
.overlay-logo{display:flex;align-items:center;gap:10px}
.overlay-logo span{font-size:24px;font-weight:900;letter-spacing:3px;color:#fff;text-transform:uppercase}
.overlay h2{font-size:20px;font-weight:900;color:#c9a84c;letter-spacing:2px;text-transform:uppercase;text-align:center}
.overlay p{color:#aac4e8;font-size:15px;text-align:center}
.player-btns{display:flex;flex-wrap:wrap;justify-content:center;gap:12px;margin-top:4px}
.pbtn{padding:14px 32px;border-radius:10px;border:2px solid rgba(201,168,76,0.45);background:rgba(201,168,76,0.08);color:#e8d5a3;font-size:18px;font-weight:700;cursor:pointer;transition:all 0.15s;letter-spacing:1px}
.pbtn:hover,.pbtn:active{background:rgba(201,168,76,0.28);border-color:#c9a84c;transform:scale(1.05)}
.custom-row{display:flex;gap:8px;margin-top:4px}
.custom-input{padding:11px 14px;border-radius:8px;border:1px solid rgba(201,168,76,0.4);background:rgba(255,255,255,0.07);color:#fff;font-size:15px;width:165px}
.custom-input::placeholder{color:#445}
.ok-btn{padding:11px 20px;border-radius:8px;border:none;background:linear-gradient(135deg,#c9a84c,#e8c96a);color:#0a1628;font-weight:700;font-size:15px;cursor:pointer}

/* ── Header ── */
.header{background:linear-gradient(135deg,#0a1628 0%,#1a3a5c 50%,#0a1628 100%);border-bottom:2px solid #c9a84c;padding:14px 20px 10px;text-align:center;position:relative;overflow:hidden}
.header::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(60deg,transparent,transparent 30px,rgba(201,168,76,0.04) 30px,rgba(201,168,76,0.04) 31px)}
.header-inner{position:relative;z-index:1}
.hlogo{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:3px}
.header h1{font-size:21px;font-weight:900;letter-spacing:2px;text-transform:uppercase}
.header-sub{font-size:11px;letter-spacing:4px;color:#c9a84c;text-transform:uppercase;margin-top:2px}
.gold-line{width:80px;height:2px;background:linear-gradient(90deg,transparent,#c9a84c,transparent);margin:7px auto 0}

/* ── Player bar ── */
.player-bar{background:#071828;border-bottom:1px solid rgba(201,168,76,0.15);padding:7px 14px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px}
.pbar-left{display:flex;align-items:center;gap:10px}
.pbar-name{font-size:13px;color:#c9a84c;font-weight:700;letter-spacing:1px}
.pbar-score{font-size:13px;color:#aac4e8}
.pbar-btn{padding:5px 10px;border-radius:6px;border:1px solid rgba(170,196,232,0.3);background:rgba(255,255,255,0.05);color:#aac4e8;font-size:11px;cursor:pointer}

/* ── Controls ── */
.controls-wrap{background:#0e2040;border-bottom:1px solid rgba(201,168,76,0.2);padding:10px 14px}
.ctrl-row{display:flex;flex-wrap:wrap;justify-content:center;gap:5px;margin-bottom:5px}
.ctrl-row:last-child{margin-bottom:0}
.btn{padding:7px 13px;border-radius:6px;border:1px solid rgba(201,168,76,0.4);background:rgba(201,168,76,0.1);color:#e8d5a3;font-size:13px;font-weight:600;cursor:pointer;transition:background 0.15s}
.btn:hover{background:rgba(201,168,76,0.25);border-color:#c9a84c}
.btn-main{background:linear-gradient(135deg,#c9a84c,#e8c96a)!important;color:#0a1628!important;border-color:transparent!important;font-weight:700!important}
.btn-main:hover{background:linear-gradient(135deg,#dbb85a,#f0d87a)!important}
.btn-grp{background:rgba(255,255,255,0.05)!important;color:#aac4e8!important;border-color:rgba(170,196,232,0.25)!important;font-size:12px!important}
.btn-grp:hover{background:rgba(255,255,255,0.11)!important;border-color:#aac4e8!important}
.btn-gold{background:rgba(255,180,50,0.12)!important;border-color:rgba(255,180,50,0.45)!important;color:#ffd580!important}

/* ── Question ── */
.question-area{padding:14px 18px 8px;text-align:center}
.q-label{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:#c9a84c;margin-bottom:5px}
#question{font-size:18px;font-weight:700;color:#fff;min-height:28px}
#feedback{min-height:24px;margin-top:6px;font-size:14px;font-weight:600;color:#7ecb8b}
#feedback.wrong{color:#e87070}
#repeat-btn{margin-top:7px;display:none}

/* ── Ranking panel ── */
.ranking-wrap{display:none;padding:14px 16px 4px;max-width:500px;margin:0 auto}
.ranking-wrap.open{display:block}
.rank-head{font-size:13px;letter-spacing:2px;text-transform:uppercase;color:#c9a84c;text-align:center;margin-bottom:10px}
.rank-row{display:flex;align-items:center;gap:10px;background:#0e2040;border-radius:8px;padding:9px 14px;margin-bottom:6px;border:1px solid rgba(255,255,255,0.06)}
.rank-medal{font-size:20px;width:26px;text-align:center}
.rank-name{flex:1;font-weight:700;color:#e8d5a3;font-size:14px}
.rank-avg{font-size:13px;color:#aac4e8}
.rank-best{font-size:12px;color:#c9a84c;margin-left:6px}
.rank-empty{color:#445;font-size:13px;text-align:center;padding:14px}
.rank-sep{height:1px;background:rgba(201,168,76,0.15);margin:4px 0 10px}
.rank-clear{display:block;margin:8px auto 14px;padding:6px 16px;border-radius:6px;border:1px solid rgba(229,57,53,0.35);background:rgba(229,57,53,0.08);color:#e87070;font-size:12px;cursor:pointer}

/* ── Grid ── */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;padding:10px 14px 28px}
.flag-card{background:#0e2040;border:2px solid rgba(255,255,255,0.07);border-radius:10px;cursor:pointer;display:flex;flex-direction:column;align-items:center;padding:10px 8px 8px;transition:transform 0.15s,border-color 0.2s,background 0.2s;min-height:148px}
.flag-card:hover{transform:translateY(-2px);border-color:rgba(201,168,76,0.45)}
.flag-card.correct{border-color:#4caf50!important;background:rgba(76,175,80,0.14)!important}
.flag-card.wrong{border-color:#e53935!important;background:rgba(229,57,53,0.14)!important}
.flag-img-wrap{width:120px;height:80px;display:flex;align-items:center;justify-content:center;border-radius:4px;overflow:hidden;border:1px solid rgba(255,255,255,0.09);background:#071020}
.flag-img-wrap img{width:120px;height:80px;object-fit:cover}
.flag-name{margin-top:8px;font-size:11px;font-weight:700;color:#c8daf5;text-align:center;letter-spacing:.3px;min-height:17px;text-transform:uppercase}
.flag-name.hidden{visibility:hidden}

/* ── Voice status ── */
.voice-panel{background:#071828;border-bottom:1px solid rgba(201,168,76,0.15);padding:7px 14px;text-align:center}
.voice-status{font-size:12px;color:#aac4e8}
.voice-status strong{color:#e8d5a3}

</style>

<body>

<!-- ── Header ── -->
<div class="header">

</div>

<!-- ── Player bar ── -->
<div class="player-bar">

    <button class="btn btn-grp" onclick="startQuiz(groupF)">Gruppe F</button>
    <button class="btn btn-grp" onclick="startQuiz(groupG)">Gruppe G</button>
    <button class="btn btn-grp" onclick="startQuiz(groupH)">Gruppe H</button>
    <button class="btn btn-grp" onclick="startQuiz(groupI)">Gruppe I</button>

</div>

<script>
const groupA=[["Mexiko","mx"],["Südafrika","za"],["Südkorea","kr"],["Tschechien","cz"]];
const groupB=[["Kanada","ca"],["Bosnien-Herzegowina","ba"],["Katar","qa"],["Schweiz","ch"]];
const groupC=[["Brasilien","br"],["Marokko","ma"],["Haiti","ht"],["Schottland","gb-sct"]];
const groupD=[["USA","us"],["Paraguay","py"],["Australien","au"],["Türkei","tr"]];
const groupE=[["Deutschland","de"],["Curaçao","cw"],["Elfenbeinküste","ci"],["Ecuador","ec"]];
const groupF=[["Niederlande","nl"],["Japan","jp"],["Schweden","se"],["Tunesien","tn"]];
const groupG=[["Belgien","be"],["Ägypten","eg"],["Iran","ir"],["Neuseeland","nz"]];
const groupH=[["Spanien","es"],["Kap Verde","cv"],["Saudi-Arabien","sa"],["Uruguay","uy"]];
const groupI=[["Frankreich","fr"],["Senegal","sn"],["Irak","iq"],["Norwegen","no"]];
const groupJ=[["Argentinien","ar"],["Algerien","dz"],["Österreich","at"],["Jordanien","jo"]];
const groupK=[["Portugal","pt"],["DR Kongo","cd"],["Usbekistan","uz"],["Kolumbien","co"]];
const groupL=[["England","gb-eng"],["Kroatien","hr"],["Ghana","gh"],["Panama","pa"]];
const allCountries=[...groupA,...groupB,...groupC,...groupD,...groupE,...groupF,...groupG,...groupH,...groupI,...groupJ,...groupK,...groupL];

const correctMsgs=["Ja, genau! Das war %s!","Perfekt! %s – gut erkannt!","Super gemacht! Das ist %s!","Richtig! %s – weiter so!","Toll, das war %s!"];
const wrongMsgs=["Noch nicht ganz – versuch's nochmal!","Nicht die Richtige – schau nochmal hin!","Fast! Aber noch nicht ganz.","Probier es nochmal – du schaffst das!"];
const greetMsgs=["Hallo %s! Schön, dass du dabei bist – zeig mal, was du draufhast!","Hey %s! Bereit für die WM 2026? Los geht's, du schaffst das!","Hi %s! Heute lernen wir die Flaggen aller 48 WM-Teams – viel Spaß!","Willkommen, %s! Mach dich warm – die Flaggen warten auf dich!","Na %s, bist du bereit? Dann mal los!"];

let mode="learn", active=allCountries, current=null, locked=false;
let player="", sCorrect=0, sTotal=0;

// ── Scores (localStorage) ────────────────────────────────
const STORE="wm2026_scores";
function loadScores(){try{return JSON.parse(localStorage.getItem(STORE)||"{}");}catch(e){return {};}}
function saveScores(d){localStorage.setItem(STORE,JSON.stringify(d));}
function commitSession(){
  if(!player||sTotal===0)return;
  const d=loadScores();
  if(!d[player])d[player]={bestPct:0,bestCorrect:0,games:0,totalCorrect:0,totalQuestions:0};
  const p=d[player];
  const pct=Math.round(sCorrect/sTotal*100);
  p.games++;
  p.totalCorrect+=sCorrect;
  p.totalQuestions+=sTotal;
  if(pct>p.bestPct){p.bestPct=pct;p.bestCorrect=sCorrect;}
  saveScores(d);
}
function clearScores(){
  if(confirm("Wirklich alle Ergebnisse löschen?"))
    {localStorage.removeItem(STORE);renderRanking();}
}
function renderRanking(){
  const d=loadScores();
  const el=document.getElementById("rankingList");
  const entries=Object.entries(d);
  if(!entries.length){el.innerHTML='<div class="rank-empty">Noch keine Ergebnisse – spielt los! ⚽</div>';return;}
  entries.sort((a,b)=>b[1].bestPct-a[1].bestPct||b[1].totalCorrect-a[1].totalCorrect);
  const medals=["🥇","🥈","🥉"];
  el.innerHTML=entries.map(([name,p],i)=>{
    const avg=p.games?Math.round(p.totalCorrect/p.games):0;
    return `<div class="rank-row">
      <span class="rank-medal">${medals[i]||"#"+(i+1)}</span>
      <span class="rank-name">${name}</span>
      <span class="rank-avg">Ø ${avg} richtig/Spiel</span>
      <span class="rank-best">Rekord: ${p.bestPct}%</span>
    </div>`;
  }).join("");
}
function toggleRanking(){
  const p=document.getElementById("rankingPanel");
  const open=p.classList.toggle("open");
  if(open)renderRanking();
}

// ── Player ───────────────────────────────────────────────
function selectPlayer(name){
  player=name;
  sCorrect=0;sTotal=0;
  document.getElementById("playerOverlay").style.display="none";
  document.getElementById("pbarName").textContent=name;
  updateScore();
  greetPlayer();
  startLearning();
}
function selectCustomPlayer(){
  const v=document.getElementById("customName").value.trim();
  if(v)selectPlayer(v);
}
function changePlayer(){
  commitSession();
  sCorrect=0;sTotal=0;
  document.getElementById("playerOverlay").style.display="flex";
}
function updateScore(){
  document.getElementById("pbarScore").textContent=sTotal>0?`${sCorrect} / ${sTotal} richtig`:"";
}

// ── TTS: robuste automatische iPad-Stimme ──────────────────────────
let _bestVoice = null;
let _voiceReadyPromise = null;
let _audioUnlocked = false;
let _speechQueue = [];
let _speaking = false;
let _lastSpoken = "";
let _lastSpeakAt = 0;

const speechNameFix = {
  "USA":"Vereinigte Staaten",
  "DR Kongo":"D. R. Kongo",
  "Curaçao":"Kurasau",
  "Bosnien-Herzegowina":"Bosnien und Herzegowina",
  "Elfenbeinküste":"Elfenbein Küste",
  "Saudi-Arabien":"Saudi Arabien",
  "Südkorea":"Süd Korea",
  "Neuseeland":"Neu Seeland",
  "Kap Verde":"Kap Verde",
  "Usbekistan":"Usbekistan"
};

function naturalText(text){
  let t = String(text || "")
    .replace(/[\u{1F300}-\u{1FFFF}\u{2600}-\u{27BF}]/gu,"")
    .replace(/\s+/g," ")
    .trim();

  Object.entries(speechNameFix).forEach(([from,to])=>{
    t = t.replaceAll(from, to);
  });

  return t
    .replace(/^Super!?\s*$/i, "Super gemacht!")
    .replace(/!+/g, "!")
    .replace(/\?+/g, "?");
}

function updateVoiceStatus(msg){
  const el = document.getElementById("voiceStatus");
  if(el) el.innerHTML = msg;
}

function scoreVoice(v){
  const name = (v.name || "").toLowerCase();
  const lang = (v.lang || "").toLowerCase();
  let s = 0;

  // Wichtigster Punkt: deutsche Stimme.
  if(lang === "de-de") s += 300;
  else if(lang.startsWith("de-")) s += 220;
  else if(lang === "de") s += 180;

  // Safari/iPad kann Stimmnamen je nach iOS-Version anders liefern.
  // Diese Namen sind häufig angenehmer, falls vorhanden.
  if(/anna/.test(name)) s += 90;
  if(/siri/.test(name)) s += 80;
  if(/helena/.test(name)) s += 70;
  if(/petra/.test(name)) s += 60;
  if(/katja/.test(name)) s += 55;
  if(/google deutsch|german|deutsch|germany/.test(name)) s += 40;
  if(/premium|enhanced|natural|eloquence|neural/.test(name)) s += 35;

  // Lokale Stimmen sind auf iPad meist zuverlässiger.
  if(v.localService) s += 25;
  if(v.default) s += 15;

  // Roboter-/Fallback-Stimmen möglichst vermeiden, aber nicht komplett ausschließen.
  if(/compact|basic|default/.test(name)) s -= 20;

  return s;
}

function chooseBestVoice(){
  if(!("speechSynthesis" in window)) return null;

  const voices = speechSynthesis.getVoices() || [];
  if(!voices.length) return null;

  const deVoices = voices.filter(v => (v.lang || "").toLowerCase().startsWith("de"));
  const candidates = deVoices.length ? deVoices : voices;

  candidates.sort((a,b)=>scoreVoice(b)-scoreVoice(a));
  _bestVoice = candidates[0] || null;

  if(_bestVoice){
    updateVoiceStatus(`🔊 Aktive Stimme: <strong>${_bestVoice.name}</strong> (${_bestVoice.lang})`);
  }else{
    updateVoiceStatus("🔊 Automatische iPad-Systemstimme aktiv");
  }

  return _bestVoice;
}

function prepareVoices(){
  if(_voiceReadyPromise) return _voiceReadyPromise;

  _voiceReadyPromise = new Promise(resolve=>{
    let tries = 0;

    const done = () => {
      const voice = chooseBestVoice();
      if(voice || tries >= 12){
        resolve(voice);
        return true;
      }
      return false;
    };

    if(done()) return;

    const timer = setInterval(()=>{
      tries++;
      if(done()) clearInterval(timer);
    }, 250);

    if("speechSynthesis" in window){
      speechSynthesis.onvoiceschanged = () => {
        chooseBestVoice();
        done();
      };
    }
  });

  return _voiceReadyPromise;
}

function unlockAudio(){
  if(_audioUnlocked) return;
  _audioUnlocked = true;

  try{
    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    if(AudioCtx){
      const ctx = new AudioCtx();
      if(ctx.state === "suspended") ctx.resume();
    }
  }catch(e){}

  prepareVoices();

  // Safari/iOS spricht zuverlässiger, wenn die Engine nach einer echten Nutzeraktion einmal kurz "geprimed" wird.
  try{
    const warmup = new SpeechSynthesisUtterance(" ");
    warmup.lang = "de-DE";
    warmup.volume = 0;
    speechSynthesis.speak(warmup);
    speechSynthesis.cancel();
  }catch(e){}
}

function enqueueSpeech(text, opts={}){
  const clean = naturalText(text);
  if(!clean || !("speechSynthesis" in window)) return;

  const now = Date.now();
  if(!opts.force && clean === _lastSpoken && now - _lastSpeakAt < 600) return;
  _lastSpoken = clean;
  _lastSpeakAt = now;

  if(opts.interrupt !== false){
    speechSynthesis.cancel();
    _speechQueue = [];
    _speaking = false;
  }

  _speechQueue.push({text: clean, opts});
  playNextSpeech();
}

async function playNextSpeech(){
  if(_speaking || !_speechQueue.length) return;
  _speaking = true;

  await prepareVoices();

  const item = _speechQueue.shift();
  const u = new SpeechSynthesisUtterance(item.text);
  u.lang = "de-DE";

  // Sehr wichtig: Wenn Safari keine gute Stimme meldet, KEINE falsche Stimme erzwingen.
  // Dann nutzt iPad die beste verfügbare Systemstimme für lang="de-DE".
  const voice = chooseBestVoice();
  if(voice && (voice.lang || "").toLowerCase().startsWith("de")){
    u.voice = voice;
  }

  // Für vierjährige Kinder angenehmer: ruhig, etwas langsamer, nicht künstlich hoch.
  u.rate = item.opts.rate || 0.84;
  u.pitch = item.opts.pitch || 1.0;
  u.volume = 1.0;

  u.onend = () => {
    _speaking = false;
    setTimeout(playNextSpeech, 70);
  };
  u.onerror = () => {
    _speaking = false;
    // Fallback: dieselbe Aussage noch einmal ohne festgelegte Stimme versuchen.
    if(u.voice){
      const fallback = new SpeechSynthesisUtterance(item.text);
      fallback.lang = "de-DE";
      fallback.rate = item.opts.rate || 0.84;
      fallback.pitch = item.opts.pitch || 1.0;
      fallback.volume = 1.0;
      fallback.onend = () => setTimeout(playNextSpeech, 70);
      try{ speechSynthesis.speak(fallback); }catch(e){ setTimeout(playNextSpeech, 70); }
    }else{
      setTimeout(playNextSpeech, 70);
    }
  };

  try{
    speechSynthesis.speak(u);
  }catch(e){
    _speaking = false;
    setTimeout(playNextSpeech, 70);
  }
}

function speak(text, opts={}){
  unlockAudio();
  enqueueSpeech(text, {...opts, force: opts.force ?? true});
}

function speakCountry(countryName){
  speak(countryName, {rate:0.80, pitch:1.0, force:true});
}

function testVoice(){
  unlockAudio();
  speak("Hallo! Ich bin bereit für das WM Flaggen Quiz. Welche Flagge gehört zu Deutschland?", {force:true});
}

function initVoices(){
  updateVoiceStatus("🔊 Stimme wird vorbereitet …");
  prepareVoices().then(v=>{
    if(!v) updateVoiceStatus("🔊 Automatische iPad-Systemstimme aktiv");
  });
  setTimeout(chooseBestVoice, 300);
  setTimeout(chooseBestVoice, 900);
  setTimeout(chooseBestVoice, 1800);
  setTimeout(chooseBestVoice, 3000);
}

document.addEventListener("DOMContentLoaded", initVoices);
document.addEventListener("touchstart", unlockAudio, {once:true});
document.addEventListener("click", unlockAudio, {once:true});

// ── UI helpers ───────────────────────────────────────────
function setFeedback(text,isWrong){
  const el=document.getElementById("feedback");
  el.textContent=text;el.className=isWrong?"wrong":"";
}
function greetPlayer(){
  const name=player||"ihr zwei";
  const msg=greetMsgs[Math.floor(Math.random()*greetMsgs.length)].replace("%s",name);
  document.getElementById("question").textContent=msg+" 😊";
  setFeedback("");
  document.getElementById("repeat-btn").style.display="none";
  speak(msg, {force:true});
}
function repeatQuestion(){
  if(mode==="quiz"&&current)speak("Welche Flagge gehört zu "+current[0]+"?", {force:true});
}
function render(){
  const g=document.getElementById("grid");g.innerHTML="";
  active.forEach(c=>{
    const d=document.createElement("div");d.className="flag-card";
    d.innerHTML=`<div class="flag-img-wrap"><img src="https://flagcdn.com/w320/${c[1]}.png" loading="lazy" onerror="this.style.opacity=0.2"></div>
      <div class="flag-name${mode==="quiz"?" hidden":""}">${c[0]}</div>`;
    d.onclick=()=>click(c,d);g.appendChild(d);
  });
}
function clearHL(){document.querySelectorAll(".flag-card").forEach(e=>e.classList.remove("correct","wrong"));}

// ── Game flow ────────────────────────────────────────────
function startLearning(){
  mode="learn";active=allCountries;locked=false;
  document.getElementById("question").textContent="Tippe auf eine Flagge, um den Namen zu hören 🎧";
  document.getElementById("repeat-btn").style.display="none";
  setFeedback("");render();
}
function startQuiz(list){
  commitSession();sCorrect=0;sTotal=0;updateScore();
  mode="quiz";active=list;locked=false;
  document.getElementById("repeat-btn").style.display="inline-block";
  nextQ();render();
}
function nextQ(){
  current=active[Math.floor(Math.random()*active.length)];
  document.getElementById("question").textContent="Welche Flagge gehört zu "+current[0]+" ?";
  setFeedback("");
  speak("Welche Flagge gehört zu "+current[0]+"?", {force:true});
}
function click(c,el){
  if(mode==="learn"){speakCountry(c[0]);clearHL();el.classList.add("correct");return;}
  if(locked)return;
  sTotal++;
  if(c[0]===current[0]){
    sCorrect++;updateScore();el.classList.add("correct");
    const msg=correctMsgs[Math.floor(Math.random()*correctMsgs.length)].replace("%s",c[0]);
    setFeedback("✅ "+msg,false);speak(msg, {force:true});locked=true;
    setTimeout(()=>{clearHL();locked=false;nextQ();},2000);
  } else {
    updateScore();el.classList.add("wrong");
    const msg=wrongMsgs[Math.floor(Math.random()*wrongMsgs.length)];
    setFeedback("❌ "+msg,true);speak(msg, {force:true});
    setTimeout(()=>el.classList.remove("wrong"),2000);
  }
}
</script>
